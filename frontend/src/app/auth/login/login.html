<div class="auth-page">
  <div class="auth-card">
    <h1>Inloggen</h1>

    <app-alert [message]="errorMessage()" />

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <app-form-field
        label="E-mailadres"
        for="email"
        [error]="form.controls.email.invalid && form.controls.email.touched ? 'Voer een geldig e-mailadres in.' : null"
      >
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="jou@email.be"
        />
      </app-form-field>

      <app-form-field
        label="Wachtwoord"
        for="password"
        [error]="form.controls.password.invalid && form.controls.password.touched ? 'Wachtwoord moet minstens 6 tekens bevatten.' : null"
      >
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
        />
      </app-form-field>

      <button type="submit" [disabled]="loading()">
        {{ loading() ? 'Bezig...' : 'Inloggen' }}
      </button>
    </form>

    <p class="auth-link">
      Nog geen account?
      <a [routerLink]="['/register']" [queryParams]="returnUrl ? { returnUrl } : {}">Registreer je hier</a>
    </p>
  </div>
</div>
